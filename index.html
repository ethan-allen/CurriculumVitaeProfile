<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 1 | Enterprise Network Animation</title>
    <style>
        /* CSS Reset & Foundation */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars during the animation phase */
            /* Deep, premium navy-to-black gradient typical of enterprise tech sites */
            background: radial-gradient(circle at center, #0a1931 0%, #02060d 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The Animation Canvas */
        #hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Sits behind the content */
        }

        /* Content Overlay Area (Ready for Phase 2) */
        .content-overlay {
            position: relative;
            z-index: 10; /* Sits above the animation */
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
            pointer-events: none; /* Lets the mouse interact with the canvas behind it */
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 180, 216, 0.5);
        }

        p {
            font-size: 1.2rem;
            color: #90e0ef;
            max-width: 600px;
            line-height: 1.6;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <!-- Phase 1: The Interactive Animated Background -->
    <canvas id="hero-canvas"></canvas>

    <!-- Placeholder for Phase 2 Content -->
    <div class="content-overlay">
        <h1>Foundation Active</h1>
        <p>Premium enterprise network animation initialized. Standing by for Phase 2 content integration.</p>
    </div>

    <script>
        // --- Premium Plexus Network Animation ---
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        let w, h;

        // Mouse interaction coordinates
        let mouse = {
            x: null,
            y: null,
            radius: 180 // Gentle magnetic interaction radius
        }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // Set Canvas to full screen
        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            init(); // Re-initialize particles to fit the new screen size
        }
        window.addEventListener('resize', resizeCanvas);

        // Particle Blueprint
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.baseX = x; // Original starting point for smooth return
                this.baseY = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
                this.density = (Math.random() * 30) + 1; // Used for smooth mouse pull
            }

            // Draw individual particle
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            // Calculate movement and fluid mouse interaction
            update() {
                // Continuous slow drift
                this.baseX += this.directionX;
                this.baseY += this.directionY;

                // Bounce off edges smoothly
                if (this.baseX > w || this.baseX < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.baseY > h || this.baseY < 0) {
                    this.directionY = -this.directionY;
                }

                // Smooth magnetic mouse interaction
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (mouse.x !== undefined && distance < mouse.radius) {
                    // Gentle push/pull math
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    let directionX = forceDirectionX * force * this.density * 0.05;
                    let directionY = forceDirectionY * force * this.density * 0.05;
                    
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // Smoothly return to their natural drifting path
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 20;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 20;
                    }
                }
                
                this.draw();
            }
        }

        // Initialize Particle Array
        function init() {
            particlesArray = [];
            // Adjusted density for a cleaner, high-end look
            let numberOfParticles = (h * w) / 12000; 
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 1.5) + 0.5; // Very delicate particles
                let x = (Math.random() * ((w - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((h - size * 2) - (size * 2)) + size * 2);
                // Very slow, deliberate drifting speed
                let directionX = (Math.random() * 0.4) - 0.2; 
                let directionY = (Math.random() * 0.4) - 0.2; 
                let color = '#00b4d8'; // Electric blue

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Draw delicate lines connecting particles
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    // Connection threshold
                    if (distance < (w / 12) * (h / 12)) {
                        opacityValue = 1 - (distance / 18000); 
                        // Sleek, highly transparent lines
                        ctx.strokeStyle = 'rgba(0, 180, 216,' + (opacityValue * 0.3) + ')'; 
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, w, h);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Run
        resizeCanvas();
        animate();
    </script>
</body>
</html>
