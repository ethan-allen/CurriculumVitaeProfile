<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Contact WebIQ" />
  <title>Contact WebIQ</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <main class="site-shell" aria-label="Contact page">
    <section class="hero" aria-labelledby="hero-title">
      <div class="animated-background" aria-hidden="true">
        <span class="orb orb-one"></span>
        <span class="orb orb-two"></span>
        <span class="orb orb-three"></span>
        <span class="grid-glow"></span>
        <span class="scan-line"></span>
      </div>

      <div class="particle-layer" aria-hidden="true"></div>

      <div class="hero-content">
        <p class="eyebrow">Secure cloud • automation • architecture</p>
        <h1 id="hero-title">Let’s connect.</h1>
        <p class="intro">
          Reach the administrator for cloud architecture, automation, and technical consulting inquiries.
        </p>
        <a class="contact-button" href="mailto:iam.administrator@webiq.cloud" aria-label="Email iam.administrator@webiq.cloud">
          Contact: iam.administrator@webiq.cloud
        </a>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
