<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 1 | Animated Foundation</title>
    <style>
        /* CSS Reset & Foundation */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars during the animation phase */
            background-color: #020813; /* Deep tech dark background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The Animation Canvas */
        #hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Sits behind the content */
        }

        /* Content Overlay Area (Ready for Phase 2) */
        .content-overlay {
            position: relative;
            z-index: 10; /* Sits above the animation */
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
            pointer-events: none; /* Lets the mouse interact with the canvas behind it */
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 4px 20px rgba(0, 229, 255, 0.4);
        }

        p {
            font-size: 1.2rem;
            color: #8bd2de;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <canvas id="hero-canvas"></canvas>

    <div class="content-overlay">
        <h1>Foundation Ready</h1>
        <p>The animated background is active. Standing by for content integration and layout structuring.</p>
    </div>

    <script>
        // --- High-Tech Particle Network Animation ---
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        let w, h;

        // Mouse interaction coordinates
        let mouse = {
            x: null,
            y: null,
            radius: 150 // Distance the mouse interacts with particles
        }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // Set Canvas to full screen
        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle Blueprint
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }

            // Draw individual particle
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            // Calculate movement and mouse interaction
            update() {
                // Bounce off edges
                if (this.x > w || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > h || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                // Mouse repel effect
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < w - this.size * 10) {
                        this.x += 1.5;
                    }
                    if (mouse.x > this.x && this.x > this.size * 10) {
                        this.x -= 1.5;
                    }
                    if (mouse.y < this.y && this.y < h - this.size * 10) {
                        this.y += 1.5;
                    }
                    if (mouse.y > this.y && this.y > this.size * 10) {
                        this.y -= 1.5;
                    }
                }

                // Move particle
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        // Initialize Particle Array
        function init() {
            particlesArray = [];
            // Adjust the divisor (10000) to increase/decrease particle density
            let numberOfParticles = (h * w) / 10000;
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1; // Particle size between 1 and 3
                let x = (Math.random() * ((w - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((h - size * 2) - (size * 2)) + size * 2);
                // Speed and direction
                let directionX = (Math.random() * 1.5) - 0.75;
                let directionY = (Math.random() * 1.5) - 0.75;
                let color = '#00e5ff'; // Cyan color to match the tech theme

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Draw lines connecting particles that are close to each other
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    // If particles are close enough, draw a line
                    if (distance < (w / 10) * (h / 10)) {
                        opacityValue = 1 - (distance / 15000); // Fade lines as they get further apart
                        ctx.strokeStyle = 'rgba(0, 229, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, w, h);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Run
        init();
        animate();
    </script>
</body>
</html>
